name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend and desktop dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Python sidecar
        shell: pwsh
        run: |
          python -m venv apps/api/.venv
          apps/api/.venv/Scripts/python.exe -m pip install --upgrade pip
          apps/api/.venv/Scripts/python.exe -m pip install -r apps/api/requirements.txt -r apps/api/requirements-windows.txt
          apps/api/.venv/Scripts/python.exe -m playwright install chromium

      - name: Build Windows installer
        run: pnpm package:windows

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: huian-inspection-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
